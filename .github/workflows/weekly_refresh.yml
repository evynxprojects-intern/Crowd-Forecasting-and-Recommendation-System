name: Weekly Trends Refresh

on:
  schedule:
    # Every Monday at 12:30 AM UTC (6:00 AM IST)
    - cron: '30 0 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  refresh-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytrends pandas numpy requests

      - name: Run weekly trends refresh
        run: |
          python refresh/refresh_trends.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit updated trends data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/trends_lookup_latest.json || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto: Weekly trends refresh $(date '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Weekly trends refresh failed. Check logs above."
